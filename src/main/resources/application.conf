ktor {
  deployment {
    port = 8080
    host = "0.0.0.0"
  }
  application {
    modules = [ com.example.car_dealership_server.ApplicationKt.module ]
  }
}

jwt {
  issuer = "car-dealership"
  audience = "car-dealership"
  realm = "car-dealership"
  secret = ${?JWT_SECRET}
  expirationMinutes = 60
}

database {
  url = ${?DB_URL}
  user = ${?DB_USER}
  password = ${?DB_PASSWORD}
  driver = "org.postgresql.Driver"
}
